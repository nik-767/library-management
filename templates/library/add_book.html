{% extends 'library/base.html' %}
{% block title %}Add Book{% endblock %}
{% block page_title %}Add New Book{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <div class="form-card-header">
            <i class="fa-solid fa-book-medical"></i>
            <h2>Add New Book</h2>
            <p>Fill in the details to add a new book to the library</p>
        </div>

        <form method="POST" action="{% url 'add_book' %}" class="form-body" id="addBookForm">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label for="name">Book Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="e.g., Python Crash Course" required maxlength="255">
                </div>
                <div class="form-group">
                    <label for="author">Author Name <span class="required">*</span></label>
                    <input type="text" id="author" name="author" placeholder="e.g., Eric Matthes" required maxlength="255">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category">
                        {% for value, display in categories %}
                        <option value="{{ value }}">{{ display }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" value="1" min="1" max="100">
                </div>
            </div>

            <div class="form-actions">
                <a href="{% url 'book_list' %}" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left"></i> Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i> Add Book
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
