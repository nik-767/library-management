{% extends 'library/base.html' %}
{% block title %}Edit Book{% endblock %}
{% block page_title %}Edit Book{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <div class="form-card-header">
            <i class="fa-solid fa-pen-to-square"></i>
            <h2>Edit Book</h2>
            <p>Update the book details below</p>
        </div>

        <form method="POST" action="{% url 'edit_book' book.pk %}" class="form-body">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label for="name">Book Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" value="{{ book.name }}" required maxlength="255">
                </div>
                <div class="form-group">
                    <label for="author">Author Name <span class="required">*</span></label>
                    <input type="text" id="author" name="author" value="{{ book.author }}" required maxlength="255">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category">
                        {% for value, display in categories %}
                        <option value="{{ value }}" {% if book.category == value %}selected{% endif %}>{{ display }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="quantity">Total Quantity</label>
                    <input type="number" id="quantity" name="quantity" value="{{ book.quantity }}" min="1" max="100">
                </div>
            </div>

            <div class="form-actions">
                <a href="{% url 'book_list' %}" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left"></i> Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-floppy-disk"></i> Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
