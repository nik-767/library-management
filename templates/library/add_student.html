{% extends 'library/base.html' %}
{% block title %}Add Student{% endblock %}
{% block page_title %}Add New Student{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <div class="form-card-header">
            <i class="fa-solid fa-user-plus"></i>
            <h2>Add New Student</h2>
            <p>Enter student details to register them in the system</p>
        </div>

        <form method="POST" action="{% url 'add_student' %}" class="form-body">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label for="name">Full Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="e.g., Aarav Sharma" required maxlength="255">
                </div>
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="e.g., aarav@college.edu" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="course">Course <span class="required">*</span></label>
                    <select id="course" name="course">
                        {% for value, display in courses %}
                        <option value="{{ value }}">{{ display }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="e.g., 9812345678" maxlength="15">
                </div>
            </div>

            <div class="form-actions">
                <a href="{% url 'student_list' %}" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left"></i> Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-user-plus"></i> Add Student
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
